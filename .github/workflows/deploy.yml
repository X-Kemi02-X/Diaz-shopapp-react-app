name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: vetconnectapp/package-lock.json

      - name: Install dependencies
        working-directory: vetconnectapp
        run: npm ci

      - name: Build
        working-directory: vetconnectapp
        run: npm run build

      - name: Decode SSH key
        run: |
          if echo "${{ secrets.VPS_KEY }}" | base64 -d > /tmp/deploy_key 2>/dev/null; then
            echo "decoded from base64"
          else
            echo "${{ secrets.VPS_KEY }}" > /tmp/deploy_key
            echo "used raw key"
          fi
          chmod 600 /tmp/deploy_key
          echo "key bytes: $(wc -c < /tmp/deploy_key)"
          head -1 /tmp/deploy_key

      - name: Prepare remote temp dir
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/deploy_key
          script: |
            set -e
            rm -rf /tmp/Diaz-shopapp-react-app-dist
            mkdir -p /tmp/Diaz-shopapp-react-app-dist

      - name: Copy dist to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/deploy_key
          source: "vetconnectapp/dist/*"
          target: "/tmp/Diaz-shopapp-react-app-dist/"
          strip_components: 2

      - name: Move files into web root
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key_path: /tmp/deploy_key
          script: |
            set -e
            rm -rf /var/www/Diaz-shopapp-react-app/*
            cp -r /tmp/Diaz-shopapp-react-app-dist/* /var/www/Diaz-shopapp-react-app/
            rm -rf /tmp/Diaz-shopapp-react-app-dist
            sudo systemctl reload nginx
